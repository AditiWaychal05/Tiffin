<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mess Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>College Mess System</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#login">Login</a>
        <a href="#feedback">Feedback</a>
    </nav>
</header>

<section id="home">
    <h2>Welcome to Mess Portal</h2>
    <p>Check daily menu, login and give feedback.</p>
</section>

<section id="menu">
    <h2>Today's Menu</h2>
    <ul>
        <li>Breakfast: Poha + Tea</li>
        <li>Lunch: Rice, Dal, Sabzi, Roti</li>
        <li>Dinner: Chapati, Paneer Curry</li>
    </ul>
</section>

<section id="login">
    <h2>Student Login</h2>
    <form onsubmit="loginUser(event)">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</section>

<section id="feedback">
    <h2>Feedback</h2>
    <form onsubmit="submitFeedback(event)">
        <textarea placeholder="Enter your feedback" required></textarea>
        <button type="submit">Submit</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
